<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#070913" />
      <stop offset="60%" stop-color="#020307" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3131" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#00ff66" />
    </linearGradient>
  </defs>

  <!-- Cosmic Background -->
  <rect width="800" height="600" fill="url(#space-bg)" />

  <!-- Stars -->
  <circle cx="70" cy="120" r="1" fill="#fff" opacity="0.6" />
  <circle cx="150" cy="450" r="1.5" fill="#fff" opacity="0.8" />
  <circle cx="320" cy="80" r="2" fill="#fff" opacity="0.9" filter="drop-shadow(0 0 3px #fff)" />
  <circle cx="280" cy="200" r="1" fill="#fff" opacity="0.4" />
  <circle cx="480" cy="500" r="1.5" fill="#fff" opacity="0.7" />
  <circle cx="580" cy="140" r="1" fill="#fff" opacity="0.5" />
  <circle cx="710" cy="380" r="2.5" fill="#fff" opacity="0.9" filter="drop-shadow(0 0 3px #fff)" />
  <circle cx="640" cy="480" r="1.2" fill="#fff" opacity="0.6" />
  <circle cx="200" cy="320" r="1" fill="#fff" opacity="0.3" />

  <!-- Giant Glowing Nebula Gas -->
  <circle cx="250" cy="250" r="150" fill="rgba(0, 255, 102, 0.03)" filter="blur(50px)" />
  <circle cx="550" cy="350" r="180" fill="rgba(255, 49, 49, 0.03)" filter="blur(60px)" />

  <!-- The Cyber Saturn Planet -->
  <g transform="translate(420, 260) rotate(-15)">
    <!-- Back Ring -->
    <ellipse cx="0" cy="0" rx="160" ry="30" fill="none" stroke="url(#ring-grad)" stroke-width="6" opacity="0.5" />
    <ellipse cx="0" cy="0" rx="140" ry="22" fill="none" stroke="url(#ring-grad)" stroke-width="2" opacity="0.3" />

    <!-- Planet Ball -->
    <circle cx="0" cy="0" r="75" fill="#0c0e18" stroke="#00ff66" stroke-width="3" filter="drop-shadow(0 0 20px rgba(0,255,102,0.4))" />
    
    <!-- Planet Band Accents -->
    <path d="M -73,-18 C -40,-5 40,-5 73,-18" fill="none" stroke="#ff3131" stroke-width="2" opacity="0.8" />
    <path d="M -70,25 C -30,40 30,40 70,25" fill="none" stroke="#00ff66" stroke-width="1.5" opacity="0.6" />
    <path d="M -75,0 C -35,15 35,15 75,0" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5" />

    <!-- Front Ring (Covers the planet front) -->
    <path d="M -160,0 A 160,30 0 0,0 160,0" fill="none" stroke="url(#ring-grad)" stroke-width="6" filter="drop-shadow(0 0 5px rgba(255,49,49,0.5))" />
    <path d="M -140,0 A 140,22 0 0,0 140,0" fill="none" stroke="url(#ring-grad)" stroke-width="2" />
  </g>

  <!-- Small distant glowing planet -->
  <circle cx="150" cy="180" r="25" fill="#05060b" stroke="#ff3131" stroke-width="1.5" filter="drop-shadow(0 0 8px rgba(255,49,49,0.3))" />
  <path d="M 127,173 C 135,180 165,180 173,173" fill="none" stroke="#ff3131" stroke-width="1" opacity="0.5" />
</svg>
